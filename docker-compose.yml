# =============================================
# GlowManager Pro — Docker Compose (Desarrollo Local)
# =============================================
# PUERTOS (sin conflictos con contenedores existentes):
#   - buscador_horarios_app   → 8585
#   - taller_vargas_web       → 5174
#   - taller_vargas_backend   → 3001
#   - taller_vargas_db        → 5436
#
#   glowmanager_frontend      → 5175 ✅
#   glowmanager_backend       → 3003 ✅
#   glowmanager_db            → 5437 ✅
# =============================================
# ARRANQUE MANUAL (NO auto-start):
#   docker compose up -d          → Levantar todos
#   docker compose up -d backend  → Solo el backend
#   docker compose down           → Bajar todos
# =============================================

services:

  # ── BASE DE DATOS ──────────────────────────
  glowmanager_db:
    image: postgres:16-alpine
    container_name: glowmanager_db
    restart: "no"                         # ← No auto-start al abrir Docker
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5437:5432"                       # ← Puerto 5437 en el host
    volumes:
      - glowmanager_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── BACKEND API ────────────────────────────
  glowmanager_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: glowmanager_backend
    restart: "no"                         # ← No auto-start al abrir Docker
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@glowmanager_db:5432/${POSTGRES_DB}
      BACKEND_PORT: ${BACKEND_PORT:-3003}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5175}
    ports:
      - "3003:3003"
    depends_on:
      glowmanager_db:
        condition: service_healthy
    volumes:
      # Hot-reload en desarrollo: sincroniza el código fuente
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
    develop:
      watch:
        - action: sync
          path: ./backend/src
          target: /app/src

  # ── FRONTEND ───────────────────────────────
  glowmanager_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: glowmanager_frontend
    restart: "no"                         # ← No auto-start al abrir Docker
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3003/api}
    ports:
      - "5175:5175"
    depends_on:
      - glowmanager_backend
    volumes:
      # Hot-reload del frontend en desarrollo
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public

# ── VOLÚMENES ──────────────────────────────
volumes:
  glowmanager_postgres_data:
    name: glowmanager_postgres_data
